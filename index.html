      overflow: hidden;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4); /* 稍暗一点突出二维码 */
    }
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 20px 20px 10px; /* 底部padding减小，整体向上挤 */
      max-height: 90vh; /* 限制高度，避免小屏溢出 */
      overflow-y: auto; /* 如果内容多，允许滚动 */
    }
    .top-image {
      width: 90vw;
      max-width: 500px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      margin-bottom: 20px; /* 减少margin，让下面内容上移 */
    }
    h1 {
      font-size: 2.8rem;
      margin-bottom: 5px; /* 减少间距 */
      text-shadow: 0 4px 10px rgba(255,105,180,0.8);
      color: #ff69b4;
    }
    p {
      font-size: 1.4rem;
      margin: 8px 0; /* 减少margin */
      text-shadow: 0 2px 6px #000;
    }
    .tip {
      font-size: 1.1rem;
      color: #ffccff;
      margin-top: 5px;
      opacity: 0.9;
    }
    .arrow {
      font-size: 4.5rem;
      color: #ff69b4;
      margin: 10px 0 0; /* 减少下面margin */
      animation: bounce 1.8s infinite;
    }
    .finger {
      font-size: 3rem;
      margin: 5px 0 5px; /* 减少间距 */
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
