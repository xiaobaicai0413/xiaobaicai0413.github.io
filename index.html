<title>同城交友</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  width: 100vw;
  min-height: 100vh;
  /* 替换成你的背景图 */
  background: url("背景图地址.jpg") center center / cover no-repeat fixed;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  font-family: "Microsoft YaHei", sans-serif;
  color: #fff;
  text-align: center;
}

/* 二维码容器 */
.qrcode-box {
  max-width: 90vw;
  background: rgba(0,0,0,0.3);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 30px;
}
.qrcode-box img {
  width: 90%;
  display: block;
  border-radius: 8px;
}

/* 引导文字 */
.text-box {
  font-size: 16px;
  line-height: 1.7;
  background: rgba(0,0,0,0.5);
  padding: 12px 20px;
  border-radius: 10px;
}
.text-box p {
  margin-bottom: 8px;
}
.text-box strong {
  color: #ffdd00;
  font-size: 18px;
}
</style>
